{% extends "base.html" %}
{% block content %}
<h2>Film bewerten</h2>

<form method="POST">
    <label>Filmtitel:</label>
    <input type="text" name="title" required>

    <label>Bewertung (0–10):</label>
    <input type="number" name="rating" min="0" max="10" step="0.1" required>

    <button type="submit">Speichern</button>
</form>

{% if message %}
<p>{{ message }}</p>
{% endif %}

{% if description %}
<h3>Beschreibung:</h3>
<p>{{ description }}</p>
{% endif %}

{% endblock %}
