<div class="movie-grid">
    {% for movie in movies %}
        <div class="movie-card">
            <div style="font-size: 40px;">🎬</div> <h3 style="font-size: 1.1rem; margin: 10px 0;">{{ movie[1] }}</h3>
            <p style="color: #666; font-size: 0.9rem;">{{ movie[2] }} | {{ movie[3] }}</p>
            
            <a href="{{ url_for('add_to_watchlist', movie_id=movie[0]) }}" 
               style="background: #007bff; color: white; padding: 8px; border-radius: 5px; text-decoration: none; display: block;">
               + Watchlist
            </a>
        </div>
    {% endfor %}
</div>
