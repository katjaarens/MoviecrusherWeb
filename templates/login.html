{% extends "base.html" %}
{% block content %}
<h2>Login</h2>

<form method="POST">
    <label>E-Mail:</label>
    <input type="email" name="email" required>

    <button type="submit">Login</button>
</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<p>Noch keinen Account? <a href="/register">Registrieren</a></p>
{% endblock %}
