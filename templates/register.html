{% extends "base.html" %}
{% block content %}
<h2>Registrieren</h2>

<form method="POST">
    <label>Name:</label>
    <input type="text" name="name" required>

    <label>E-Mail:</label>
    <input type="email" name="email" required>

    <label>Alter:</label>
    <input type="number" name="age" required>

    <button type="submit">Account erstellen</button>
</form>

{% endblock %}
