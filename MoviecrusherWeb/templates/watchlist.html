{% extends "base.html" %}
{% block content %}

<h2 class="page-title">Deine Watchlist</h2>

{% if watchlist %}
<div class="results-box">
    {% for movie in watchlist %}
        <div class="movie-item">
            <strong>{{ movie[1] }}</strong> ({{ movie[3] }}) – {{ movie[2] }}
        </div>
    {% endfor %}
</div>
{% else %}
<p class="info">Deine Watchlist ist leer.</p>
{% endif %}

{% endblock %}
